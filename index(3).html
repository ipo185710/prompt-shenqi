<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0f766e">
<title>提示詞神器</title>
<style>
:root {
  --bg:#f6f7fb; --panel:#ffffff; --soft:#f0f4f8; --text:#172033; --muted:#667085;
  --line:#e5e7eb; --primary:#0f766e; --primary2:#14b8a6; --danger:#dc2626;
  --shadow:0 14px 40px rgba(15,23,42,.08);
}
body.dark {
  --bg:#0c111b; --panel:#141b27; --soft:#1c2533; --text:#f8fafc; --muted:#aab4c4;
  --line:#283244; --primary:#2dd4bf; --primary2:#14b8a6; --shadow:0 14px 40px rgba(0,0,0,.28);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif;background:var(--bg);color:var(--text)}
button,input,textarea,select{font:inherit}
.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}
.sidebar{position:sticky;top:0;height:100vh;padding:24px 18px;background:var(--panel);border-right:1px solid var(--line);overflow:auto}
.brand{display:flex;gap:12px;align-items:center;margin-bottom:22px}
.logo{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary2));font-weight:900}
.brand strong{display:block;font-size:17px} .brand small{color:var(--muted)}
.side-title{font-size:12px;color:var(--muted);font-weight:800;margin:18px 10px 8px;text-transform:uppercase;letter-spacing:.08em}
.navbtn{width:100%;display:flex;justify-content:space-between;align-items:center;border:0;background:transparent;color:var(--text);padding:11px 12px;border-radius:12px;cursor:pointer;margin:2px 0;text-align:left}
.navbtn:hover,.navbtn.active{background:var(--soft)} .count{font-size:12px;color:var(--muted)}
.side-actions{display:grid;gap:8px;margin-top:20px}
.side-actions button{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:10px;border-radius:12px;cursor:pointer}
.main{padding:28px;min-width:0}
.topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:22px}
.search{flex:1;display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px 14px;box-shadow:var(--shadow)}
.search input{flex:1;border:0;outline:0;background:transparent;color:var(--text)}
.top-actions{display:flex;gap:10px}
.primary,.ghost,.danger{border:0;border-radius:13px;padding:11px 15px;cursor:pointer;font-weight:800}
.primary{color:white;background:linear-gradient(135deg,var(--primary),var(--primary2))}
.ghost{background:var(--panel);color:var(--text);border:1px solid var(--line)}
.danger{background:#fee2e2;color:#991b1b}
.hero{background:linear-gradient(135deg,var(--panel),var(--soft));border:1px solid var(--line);border-radius:24px;padding:26px;margin-bottom:22px;box-shadow:var(--shadow)}
.hero h1{margin:0 0 8px;font-size:clamp(28px,4vw,48px)} .hero p{margin:0;color:var(--muted);line-height:1.7}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.pill{background:var(--panel);border:1px solid var(--line);padding:8px 11px;border-radius:999px;font-size:13px;color:var(--muted)}
.section-head{display:flex;justify-content:space-between;align-items:center;margin:18px 2px 12px}
.section-head h2{margin:0;font-size:21px} .section-head span{color:var(--muted);font-size:14px}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.05);display:flex;flex-direction:column;min-height:230px}
.card:hover{transform:translateY(-2px);transition:.18s}
.card-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.cat{font-size:12px;color:var(--primary);font-weight:900;background:color-mix(in srgb,var(--primary) 12%,transparent);padding:6px 9px;border-radius:999px}
.star{border:0;background:transparent;font-size:21px;cursor:pointer}
.card h3{margin:14px 0 7px;font-size:20px} .card p{color:var(--muted);line-height:1.6;margin:0}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0} .tag{font-size:12px;background:var(--soft);padding:5px 8px;border-radius:999px;color:var(--muted)}
.card-actions{display:flex;gap:8px;margin-top:auto} .card-actions button{flex:1;border:0;border-radius:11px;padding:10px;cursor:pointer;font-weight:800}
.copy-mini{background:var(--primary);color:white} .open-mini{background:var(--soft);color:var(--text)}
.empty{padding:40px;text-align:center;color:var(--muted);background:var(--panel);border:1px dashed var(--line);border-radius:20px;grid-column:1/-1}
.modal{position:fixed;inset:0;background:rgba(3,7,18,.58);display:none;place-items:center;padding:18px;z-index:50;backdrop-filter:blur(8px)}
.modal.open{display:grid} .dialog{width:min(820px,100%);max-height:92vh;overflow:auto;background:var(--panel);border-radius:24px;padding:22px;border:1px solid var(--line);box-shadow:0 30px 90px rgba(0,0,0,.28)}
.dialog-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px} .dialog h2{margin:0} .close{border:0;background:var(--soft);color:var(--text);width:40px;height:40px;border-radius:12px;font-size:22px;cursor:pointer}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px} label{display:grid;gap:7px;font-weight:800;font-size:14px} input,textarea,select{width:100%;border:1px solid var(--line);border-radius:12px;background:var(--soft);color:var(--text);padding:12px;outline:none} textarea{min-height:250px;resize:vertical;line-height:1.7}
.full{grid-column:1/-1} .dialog-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}
.viewer-meta{color:var(--muted);margin-bottom:12px} .viewer-text{white-space:pre-wrap;line-height:1.8;background:var(--soft);border:1px solid var(--line);padding:16px;border-radius:16px;min-height:220px}
.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);background:#111827;color:#fff;padding:12px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:.2s;z-index:80;font-weight:800} .toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:980px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:760px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto;border-right:0;border-bottom:1px solid var(--line)}.main{padding:18px}.topbar{align-items:stretch;flex-direction:column}.grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.full{grid-column:auto}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="brand"><div class="logo">P</div><div><strong>提示詞神器</strong><small>Firebase 雲端同步版</small></div></div>
  <button class="navbtn active" data-filter="all"><span>🏠 全部提示詞</span><span class="count" id="countAll"></span></button>
  <button class="navbtn" data-filter="favorites"><span>⭐ 我的收藏</span><span class="count" id="countFav"></span></button>
  <button class="navbtn" data-filter="recent"><span>🕒 最近使用</span><span class="count" id="countRecent"></span></button>
  <div class="side-title">分類</div>
  <div id="categoryNav"></div>
  <div class="side-actions">
<button id="themeBtn">切換深色模式</button>
</div>
</aside>
<main class="main">
  <div class="topbar">
    <div class="search">🔍<input id="searchInput" placeholder="搜尋標題、分類、標籤或提示詞內容…"></div>
    <div class="top-actions"><button class="primary" id="addBtn">＋ 新增 Prompt</button></div>
  </div>
  <section class="hero">
    <h1>你的 AI Prompt 資料庫</h1>
    <p>不用登入即可搜尋、複製、新增與編輯提示詞。所有提示詞透過 Firebase 雲端即時同步。</p>
    <div class="stats"><span class="pill" id="statPrompts"></span><span class="pill" id="statCats"></span><span class="pill">支援手機與電腦</span></div>
  </section>
  <div class="section-head"><h2 id="sectionTitle">全部提示詞</h2><span id="resultCount"></span></div>
  <section class="grid" id="promptGrid"></section>
</main>
</div>

<div class="modal" id="viewerModal"><div class="dialog">
  <div class="dialog-head"><div><h2 id="viewerTitle"></h2><div class="viewer-meta" id="viewerMeta"></div></div><button class="close" data-close="viewerModal">×</button></div>
  <div class="viewer-text" id="viewerText"></div>
  <div class="dialog-actions">
    <button class="ghost" id="viewerEdit">編輯</button>
    <button class="primary" id="viewerCopy">複製提示詞</button>
  </div>
</div></div>

<div class="modal" id="editorModal"><div class="dialog">
  <div class="dialog-head"><div><h2 id="editorTitle">新增 Prompt</h2></div><button class="close" data-close="editorModal">×</button></div>
  <div class="form-grid">
    <label>標題<input id="fTitle" placeholder="例如：電影感商品照"></label>
    <label>分類<input id="fCategory" placeholder="例如：修圖、電商、影片"></label>
    <label class="full">簡短說明<input id="fDescription" placeholder="這個提示詞適合做什麼"></label>
    <label class="full">標籤<input id="fTags" placeholder="用逗號分隔，例如：商品攝影, 光影, 高級感"></label>
    <label class="full">Prompt 內容<textarea id="fPrompt" placeholder="貼上完整提示詞…"></textarea></label>
  </div>
  <div class="dialog-actions">
    <button class="danger" id="deleteBtn" style="display:none">刪除</button>
    <button class="ghost" data-close="editorModal">取消</button>
    <button class="primary" id="saveBtn">儲存 Prompt</button>
  </div>
</div></div>

<div class="toast" id="toast">已完成</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc,
  onSnapshot, getDocs, writeBatch, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDSLMgCoxggaCTASY5oTUz8cHyDoZDGC_Y",
  authDomain: "promptshenqi.firebaseapp.com",
  projectId: "promptshenqi",
  storageBucket: "promptshenqi.firebasestorage.app",
  messagingSenderId: "220453906072",
  appId: "1:220453906072:web:6e1d01cec3cc11ba0312ed",
  measurementId: "G-7WRTNEJKJX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const promptsRef = collection(db, "prompts");

const DEFAULT_PROMPTS = [{"id": "scene", "title": "產品融入場景", "category": "修圖", "description": "將產品自然合成到指定背景，統一透視、光影與反射。", "tags": ["場景融合", "商品攝影", "光影"], "favorite": true, "prompt": "對產品圖像進行精細化後期處理。首先精準去除產品的背景，確保產品輪廓完整、細節無損，同時完整保留背景的原始色調。修正畫面中任何不自然的重疊關係與視覺接縫，使產品與背景的銜接乾淨俐落。統一產品與場景的光影邏輯，為產品賦予與環境光一致的自然照明，使其色調、亮度與飽和度與背景完美匹配。在產品與地板的接觸面，呈現真實且柔和的投射陰影。最終實現產品與場景在透視關係、光線方向及反射映射上的完整物理融合，達到商業級攝影作品的呈現標準。"}, {"id": "upscale", "title": "模糊圖片高清", "category": "修圖", "description": "提升清晰度、細節與動態範圍，同時保持原圖不變形。", "tags": ["高清", "4K", "修復"], "favorite": false, "prompt": "基於提供的參考圖片進行嚴格的超高解析度 4K 增強。必須絕對忠實於原始面部結構、比例與身份特徵。在表情、視線、姿勢、相機角度、畫面構圖及透視關係上保持零偏差。服裝、頭髮、皮膚以及背景元素的結構、位置與設計必須完全保持不變。恢復微觀層級細節，呈現自然寫實效果。增強毛孔、細紋、髮絲、睫毛、織物紋理、縫線以及材質邊緣，但不得加入任何風格化處理。色彩科學、白平衡以及整體色調關係必須與原圖完全一致。光線方向、光線強度、對比度及明暗表現必須精確匹配原始圖片，只允許提升清晰度與擴展動態範圍。禁止重新布光。禁止改變物體形狀。"}, {"id": "retouch", "title": "精修產品", "category": "電商", "description": "商業級產品精修，適合電商主圖與商品頁。", "tags": ["產品精修", "白底圖", "電商"], "favorite": true, "prompt": "對產品進行高精度商業級精修處理。產品置於純白背景上，採用正視圖、水平方向視角進行 3D 渲染表現。精準還原產品原始色彩及包裝材質：玻璃部分呈現晶瑩通透質感；塑膠部分保留柔和霧面效果；金屬部件呈現細膩光澤與反射。重點強化產品高光反射與陰影層次，使光影立體感更加鮮明。徹底清除表面的指紋、灰塵與細微瑕疵，讓產品保持全新狀態。瓶身標籤與所有文字資訊保持極致銳利清晰。整體光線柔和均勻，突顯產品精緻感與高級質感。最終成品符合高品質電商主圖的商業視覺標準。"}, {"id": "sketch", "title": "圖片變手繪線稿", "category": "風格", "description": "將產品轉為工業設計黑白線稿與藍圖風格。", "tags": ["手繪", "線稿", "工業設計"], "favorite": false, "prompt": "智慧提取目標物體的空間透視與三維輪廓。一鍵轉換為具有工業設計美感的黑白概念線稿。精準勾勒空氣動力學邊緣、機械傳動部件及裝配接縫。背景自動生成專業流體力學輔助線、透視網格及尺寸標註排版。採用精準的馬克筆筆觸與細緻灰階排線表現截面體積。呈現頂級工業設計師手繪藍圖質感。圖片比例保持 3:4，不變形。輸出解析度 2K。"}, {"id": "remove", "title": "移除物品", "category": "修圖", "description": "完整移除指定物品，並自然修補背景與材質。", "tags": ["移除", "修補", "背景"], "favorite": false, "prompt": "移除圖片中的指定產品，以及其陰影、反光與所有相關投影。產品原本所在位置依照周圍環境自然填補，例如延伸背景圖案、延續材質紋理或還原原始表面。不得留下任何刪除痕跡。畫面中其他所有元素的位置、形狀、色彩與細節必須保持 100% 不變。"}, {"id": "light", "title": "增加光效", "category": "光影特效", "description": "加入科技感霓虹燈光、粒子與高速動態效果。", "tags": ["霓虹", "粒子", "科技感"], "favorite": true, "prompt": "嚴格保持主體外輪廓不變。將背景調整為深色氛圍。把產品外殼轉換為半透明黑透材質，清楚展現內部精密散熱銅管與電路結構。於渦輪吸入口核心注入充滿能量感的霓虹雙色動態光效，例如電光藍搭配核心橘。在風扇周圍生成符合空氣動力學的懸浮發光粒子與高速旋轉光暈拖尾。整體呈現強烈科技感、未來感與高性能硬派競技風格。圖片比例維持 3:4。輸出解析度 2K。"}];
const RECENT_KEY = 'prompt_library_pro_recent_v1';
const THEME_KEY = 'prompt_library_pro_theme_v1';

let prompts = [];
let recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
let currentFilter = 'all';
let currentViewId = null;
let editingId = null;
let initialSyncDone = false;

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const saveRecent = () => localStorage.setItem(RECENT_KEY, JSON.stringify(recent.slice(0,30)));

function escapeHtml(str='') {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]);
}
function toast(msg) {
  const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1700);
}
function categories() {
  return [...new Set(prompts.map(p=>p.category).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'zh-Hant'));
}
function openModal(id) { $('#'+id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal(id) { $('#'+id).classList.remove('open'); document.body.style.overflow=''; }
$$('[data-close]').forEach(b=>b.addEventListener('click',()=>closeModal(b.dataset.close)));
$$('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m) closeModal(m.id)}));
document.addEventListener('keydown',e=>{if(e.key==='Escape') $$('.modal.open').forEach(m=>closeModal(m.id))});

function normalizePrompt(id, data) {
  return {
    id,
    title: data.title || '未命名提示詞',
    category: data.category || '未分類',
    description: data.description || '',
    tags: Array.isArray(data.tags) ? data.tags : [],
    prompt: data.prompt || '',
    favorite: Boolean(data.favorite),
    order: Number.isFinite(Number(data.order)) ? Number(data.order) : 9999
  };
}

async function seedDefaultsIfEmpty() {
  const snapshot = await getDocs(promptsRef);
  if (!snapshot.empty) return;
  const batch = writeBatch(db);
  DEFAULT_PROMPTS.forEach((item, index) => {
    batch.set(doc(db, 'prompts', item.id), {
      ...item,
      order: index + 1,
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });
  });
  await batch.commit();
  toast('已建立預設提示詞');
}

function renderNav() {
  $('#countAll').textContent=prompts.length;
  $('#countFav').textContent=prompts.filter(p=>p.favorite).length;
  $('#countRecent').textContent=recent.filter(id=>prompts.some(p=>p.id===id)).length;
  $('#categoryNav').innerHTML=categories().map(c=>`<button class="navbtn" data-filter="cat:${escapeHtml(c)}"><span>📁 ${escapeHtml(c)}</span><span class="count">${prompts.filter(p=>p.category===c).length}</span></button>`).join('');
  $$('.navbtn').forEach(btn=>btn.onclick=()=>{currentFilter=btn.dataset.filter; $$('.navbtn').forEach(x=>x.classList.remove('active')); btn.classList.add('active'); render();});
}
function filteredPrompts() {
  const q=$('#searchInput').value.trim().toLowerCase();
  let list=[...prompts];
  if(currentFilter==='favorites') list=list.filter(p=>p.favorite);
  else if(currentFilter==='recent') list=recent.map(id=>prompts.find(p=>p.id===id)).filter(Boolean);
  else if(currentFilter.startsWith('cat:')) list=list.filter(p=>p.category===currentFilter.slice(4));
  if(q) list=list.filter(p=>[p.title,p.category,p.description,p.prompt,(p.tags||[]).join(' ')].join(' ').toLowerCase().includes(q));
  return list;
}
function render() {
  renderNav();
  const list=filteredPrompts();
  const titles={all:'全部提示詞',favorites:'我的收藏',recent:'最近使用'};
  $('#sectionTitle').textContent=titles[currentFilter] || (currentFilter.startsWith('cat:')?currentFilter.slice(4):'提示詞');
  $('#resultCount').textContent=`共 ${list.length} 筆`;
  $('#statPrompts').textContent=`${prompts.length} 個 Prompt`;
  $('#statCats').textContent=`${categories().length} 個分類`;
  $('#promptGrid').innerHTML=list.length?list.map(p=>`
    <article class="card">
      <div class="card-top"><span class="cat">${escapeHtml(p.category||'未分類')}</span><button class="star" onclick="toggleFavorite('${p.id}')">${p.favorite?'★':'☆'}</button></div>
      <h3>${escapeHtml(p.title)}</h3>
      <p>${escapeHtml(p.description||'')}</p>
      <div class="tags">${(p.tags||[]).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>
      <div class="card-actions"><button class="open-mini" onclick="openViewer('${p.id}')">查看</button><button class="copy-mini" onclick="copyPrompt('${p.id}')">複製</button></div>
    </article>`).join(''):`<div class="empty">${initialSyncDone ? '找不到符合條件的提示詞。' : '正在連接 Firebase 雲端資料庫…'}</div>`;
}

window.toggleFavorite=async id=>{
  const p=prompts.find(x=>x.id===id); if(!p)return;
  try {
    await updateDoc(doc(db,'prompts',id), {favorite:!p.favorite,updatedAt:serverTimestamp()});
  } catch(err) {
    console.error(err); toast('收藏更新失敗');
  }
};
window.copyPrompt=async id=>{
  const p=prompts.find(x=>x.id===id); if(!p)return;
  try{await navigator.clipboard.writeText(p.prompt)}catch{const ta=document.createElement('textarea');ta.value=p.prompt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove()}
  markRecent(id); toast('已複製提示詞');
};
function markRecent(id) { recent=[id,...recent.filter(x=>x!==id)].slice(0,30); saveRecent(); renderNav(); }
window.openViewer=id=>{
  const p=prompts.find(x=>x.id===id);if(!p)return;
  currentViewId=id;
  $('#viewerTitle').textContent=p.title;
  $('#viewerMeta').textContent=`${p.category||'未分類'} · ${(p.tags||[]).join('、')}`;
  $('#viewerText').textContent=p.prompt;
  markRecent(id);
  openModal('viewerModal');
};
$('#viewerCopy').onclick=()=>copyPrompt(currentViewId);
$('#viewerEdit').onclick=()=>{closeModal('viewerModal'); openEditor(currentViewId)};

function openEditor(id=null) {
  editingId=id;
  const p=id?prompts.find(x=>x.id===id):null;
  $('#editorTitle').textContent=p?'編輯 Prompt':'新增 Prompt';
  $('#fTitle').value=p?.title||'';
  $('#fCategory').value=p?.category||'';
  $('#fDescription').value=p?.description||'';
  $('#fTags').value=(p?.tags||[]).join(', ');
  $('#fPrompt').value=p?.prompt||'';
  $('#deleteBtn').style.display=p?'inline-block':'none';
  openModal('editorModal');
}
$('#addBtn').onclick=()=>openEditor();

$('#saveBtn').onclick=async()=>{
  const title=$('#fTitle').value.trim();
  const category=$('#fCategory').value.trim();
  const prompt=$('#fPrompt').value.trim();
  if(!title||!category||!prompt){toast('請填寫標題、分類與 Prompt');return;}
  const old=editingId?prompts.find(x=>x.id===editingId):null;
  const data={
    title,
    category,
    description:$('#fDescription').value.trim(),
    tags:$('#fTags').value.split(/[,，]/).map(x=>x.trim()).filter(Boolean),
    prompt,
    favorite:old?.favorite||false,
    order:old?.order ?? (prompts.length+1),
    updatedAt:serverTimestamp()
  };
  try {
    if(editingId) {
      await updateDoc(doc(db,'prompts',editingId),data);
    } else {
      await addDoc(promptsRef,{...data,createdAt:serverTimestamp()});
    }
    closeModal('editorModal');
    toast(editingId?'已同步更新 Prompt':'已同步新增 Prompt');
  } catch(err) {
    console.error(err);
    toast('雲端儲存失敗，請檢查 Firestore 規則');
  }
};

$('#deleteBtn').onclick=async()=>{
  if(!editingId)return;
  if(!confirm('確定要刪除這個 Prompt 嗎？')) return;
  try {
    await deleteDoc(doc(db,'prompts',editingId));
    recent=recent.filter(x=>x!==editingId); saveRecent();
    closeModal('editorModal');
    toast('已從雲端刪除');
  } catch(err) {
    console.error(err); toast('刪除失敗');
  }
};

$('#searchInput').addEventListener('input',render);

$('#themeBtn').onclick=()=>{document.body.classList.toggle('dark');localStorage.setItem(THEME_KEY,document.body.classList.contains('dark')?'dark':'light');};
if(localStorage.getItem(THEME_KEY)==='dark')document.body.classList.add('dark');

render();

onSnapshot(promptsRef, async snapshot=>{
  if(snapshot.empty && !initialSyncDone) {
    initialSyncDone=true;
    try { await seedDefaultsIfEmpty(); } catch(err) { console.error(err); toast('無法建立預設提示詞'); }
    return;
  }
  prompts=snapshot.docs.map(d=>normalizePrompt(d.id,d.data())).sort((a,b)=>a.order-b.order || a.title.localeCompare(b.title,'zh-Hant'));
  initialSyncDone=true;
  render();
}, err=>{
  console.error(err);
  initialSyncDone=true;
  $('#promptGrid').innerHTML='<div class="empty">Firebase 連線失敗。請確認 Firestore 規則允許讀取。</div>';
  toast('Firebase 連線失敗');
});
</script>
</body>
</html>
